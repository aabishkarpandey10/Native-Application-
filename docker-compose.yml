# Sydney Transit — Docker full stack
#   npm run docker:setup && npm run docker:up
#
#   App (web + proxied API):  http://localhost:8085
#   Admin:                    http://localhost:8085/admin
#   Direct API (optional):    http://localhost:3000/api/health

name: sydney-transit

services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: sydney-transit-api
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      PORT: 3000
      HOST: 0.0.0.0
      NODE_ENV: production
      ENABLE_ADMIN: ${ENABLE_ADMIN:-true}
      ALLOW_MOCK_DATA: ${ALLOW_MOCK_DATA:-false}
      REDIS_ENABLED: ${REDIS_ENABLED:-false}
      JWT_SECRET: ${DOCKER_JWT_SECRET:-sydney-transit-docker-runtime-secret-min-32c}
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:8085}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    volumes:
      - api-data:/app/backend/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        EXPO_PUBLIC_API_SAME_ORIGIN: "true"
        EXPO_PUBLIC_API_URL: ""
        EXPO_PUBLIC_SUPABASE_URL: ${EXPO_PUBLIC_SUPABASE_URL:-}
        EXPO_PUBLIC_SUPABASE_ANON_KEY: ${EXPO_PUBLIC_SUPABASE_ANON_KEY:-}
        EXPO_PUBLIC_SENTRY_DSN: ${EXPO_PUBLIC_SENTRY_DSN:-}
        EXPO_PUBLIC_ENABLE_ADMIN: ${EXPO_PUBLIC_ENABLE_ADMIN:-true}
        EXPO_PUBLIC_ENABLE_ASSISTANT: ${EXPO_PUBLIC_ENABLE_ASSISTANT:-false}
        EXPO_PUBLIC_API_DEBUG: ${EXPO_PUBLIC_API_DEBUG:-false}
    container_name: sydney-transit-web
    ports:
      - "${WEB_PORT:-8085}:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  api-data:
