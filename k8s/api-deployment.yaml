apiVersion: apps/v1
kind: Deployment
metadata:
  name: tripview-api
  namespace: tripview
  labels:
    app: tripview-api
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: tripview-api
  template:
    metadata:
      labels:
        app: tripview-api
        version: v1
    spec:
      containers:
        - name: api
          image: tripview/api:latest
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: REDIS_ENABLED
              value: "true"
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: tripview-secrets
                  key: redis-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: tripview-secrets
                  key: jwt-secret
            - name: TFNSW_API_KEY
              valueFrom:
                secretKeyRef:
                  name: tripview-secrets
                  key: tfnsw-api-key
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: tripview-secrets
                  key: database-url
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /api/status
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/status
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: tripview-api
  namespace: tripview
spec:
  type: ClusterIP
  selector:
    app: tripview-api
  ports:
    - port: 80
      targetPort: 3000
      name: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: tripview-api-hpa
  namespace: tripview
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: tripview-api
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
