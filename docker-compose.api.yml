# API only — use with: npm run docker:api
# Pair with local Expo: npx expo start --web --port 8085

name: sydney-transit-api

services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: sydney-transit-api
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      PORT: 3000
      HOST: 0.0.0.0
      NODE_ENV: production
      ENABLE_ADMIN: ${ENABLE_ADMIN:-true}
      ALLOW_MOCK_DATA: ${ALLOW_MOCK_DATA:-false}
      JWT_SECRET: ${DOCKER_JWT_SECRET:-sydney-transit-docker-runtime-secret-min-32c}
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:3000}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    volumes:
      - api-data:/app/backend/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  api-data:
